<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDN Prediction Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0e12; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .neon-border { box-shadow: 0 0 15px rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); }
        .rating-badge { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .odds-btn { background-color: #1e212b; border: 1px solid #2d3142; transition: all 0.2s; }
        .odds-btn:hover { border-color: #06b6d4; background-color: #1a2e3b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-5xl mx-auto mb-10 text-center">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-cyan-400 tracking-wider">EDN PREDICTION CENTER</h1>
        <p class="text-gray-400 mt-2">Analyze Custom Group Odds & Stake Securely</p>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Active Matchups List -->
        <div class="lg:col-span-2 space-y-6" id="matchups-container">
            <p class="text-gray-500">Loading active eFootball fixtures...</p>
        </div>

        <!-- Sidebar Payment Panel -->
        <div class="space-y-6">
            <div class="p-6 rounded-2xl bg-[#15171e] border border-gray-800">
                <h3 class="text-xl font-bold text-amber-400 mb-3">eSewa Merchant Desk</h3>
                <p class="text-xs text-gray-400 mb-4">Scan the QR code below to stake your pool allocations safely (Rs 10 - Rs 200).</p>
                
                <div class="w-full h-48 bg-white rounded-xl mb-4 flex items-center justify-center text-black font-bold p-4 text-center border-4 border-emerald-500">
                    [ Place Your eSewa QR Code Image Here ]
                </div>
                
                <p class="text-xs font-mono text-center text-emerald-400 bg-[#1e212b] py-2 rounded-lg border border-emerald-900">
                    Limit: 1 Stake Per User / Match
                </p>
            </div>
        </div>
    </main>

    <script>
        // Global fallback image if gallery image path fails to load
        const defaultAvatar = "https://via.placeholder.com/150/1e212b/fff?text=eFootball";

        async function loadFixtures() {
            const container = document.getElementById('matchups-container');
            try {
                const response = await fetch('matches.json?cache_bust=' + Date.now());
                if (!response.ok) throw new Error("Data file could not be read.");
                
                const matches = await response.json();
                container.innerHTML = '';

                if(!Array.isArray(matches) || matches.length === 0) {
                    container.innerHTML = '<div class="p-6 text-center text-gray-500 border border-dashed border-gray-800 rounded-2xl">No active matchups listed right now. Check back soon!</div>';
                    return;
                }

                matches.forEach(match => {
                    // Safe properties checks to avoid web errors if properties are missing
                    const p1Name = match.player1?.name || "Player 1";
                    const p1Rating = match.player1?.rating || "90";
                    const p1Img = match.player1?.image || defaultAvatar;

                    const p2Name = match.player2?.name || "Player 2";
                    const p2Rating = match.player2?.rating || "90";
                    const p2Img = match.player2?.image || defaultAvatar;

                    const card = document.createElement('div');
                    card.className = "p-6 rounded-3xl bg-[#15171e] border border-gray-800 flex flex-col gap-6";
                    
                    card.innerHTML = `
                        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div class="flex items-center gap-4 w-full sm:w-2/5 justify-start sm:justify-end">
                                <div class="text-left sm:text-right">
                                    <h4 class="font-bold text-lg text-white">${p1Name}</h4>
                                    <span class="rating-badge text-xs font-black px-2 py-0.5 rounded text-black">OVR ${p1Rating}</span>
                                </div>
                                <img src="${p1Img}" onerror="this.src='${defaultAvatar}'" class="w-16 h-16 rounded-full border-2 border-amber-500 object-cover" alt="P1">
                            </div>

                            <div class="text-center bg-[#1e212b] px-4 py-1 rounded-full text-xs font-bold text-cyan-400 tracking-widest whitespace-nowrap">
                                ${match.match_type || 'MATCHUP'}
                            </div>

                            <div class="flex items-center gap-4 w-full sm:w-2/5 justify-start">
                                <img src="${p2Img}" onerror="this.src='${defaultAvatar}'" class="w-16 h-16 rounded-full border-2 border-amber-500 object-cover" alt="P2">
                                <div>
                                    <h4 class="font-bold text-lg text-white">${p2Name}</h4>
                                    <span class="rating-badge text-xs font-black px-2 py-0.5 rounded text-black">OVR ${p2Rating}</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 text-center pt-2 border-t border-gray-800">
                            <div class="p-2 odds-btn rounded-xl">
                                <div class="text-[10px] text-gray-400">1 (Home Win)</div>
                                <div class="text-sm font-bold text-emerald-400">${match.odds?.full_time?.['1'] || '1.0'}</div>
                            </div>
                            <div class="p-2 odds-btn rounded-xl">
                                <div class="text-[10px] text-gray-400">X (Draw)</div>
                                <div class="text-sm font-bold text-emerald-400">${match.odds?.full_time?.['X'] || '1.0'}</div>
                            </div>
                            <div class="p-2 odds-btn rounded-xl">
                                <div class="text-[10px] text-gray-400">2 (Away Win)</div>
                                <div class="text-sm font-bold text-emerald-400">${match.odds?.full_time?.['2'] || '1.0'}</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-4 gap-2 text-center text-xs">
                            <div class="bg-[#111319] p-2 rounded-lg border border-gray-800">
                                <span class="text-gray-500 block text-[9px]">1 HT</span>
                                <span class="font-semibold text-cyan-400">${match.odds?.half_time?.['1HT'] || '1.0'}</span>
                            </div>
                            <div class="bg-[#111319] p-2 rounded-lg border border-gray-800">
                                <span class="text-gray-500 block text-[9px]">X HT</span>
                                <span class="font-semibold text-cyan-400">${match.odds?.half_time?.['XHT'] || '1.0'}</span>
                            </div>
                            <div class="bg-[#111319] p-2 rounded-lg border border-gray-800">
                                <span class="text-gray-500 block text-[9px]">2 HT</span>
                                <span class="font-semibold text-cyan-400">${match.odds?.half_time?.['2HT'] || '1.0'}</span>
                            </div>
                            <div class="bg-[#111319] p-2 rounded-lg border border-amber-900/40">
                                <span class="text-amber-500 block text-[9px]">CS Avg</span>
                                <span class="font-semibold text-amber-400">${match.odds?.correct_score || '1.0'}x</span>
                            </div>
                        </div>

                        <a href="https://forms.google.com" target="_blank" class="w-full text-center bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2.5 rounded-xl text-sm transition tracking-wide shadow-lg shadow-cyan-950/50">
                            Lock Stake for This Match
                        </a>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error configuration parsing error:", error);
                container.innerHTML = '<div class="p-6 text-center text-red-500 bg-red-950/20 border border-red-900 rounded-2xl">⚠️ Tech Error: Could not load active odds setup. Check your network or repository sync.</div>';
            }
        }
        window.onload = loadFixtures;
    </script>
</body>
</html>
