<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDN Prediction Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-image: url('images/bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed;
            background-color: #0d0e12; 
            color: #e2e8f0; 
            font-family: 'Segoe UI', sans-serif; 
        }
        .neon-border { box-shadow: 0 0 15px rgba(6, 182, 212, 0.15); border: 1px solid rgba(6, 182, 212, 0.3); }
        .rating-badge { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .market-card { background-color: #15171e; border: 2px solid #232631; cursor: pointer; transition: all 0.2s ease-in-out; }
        .market-card:hover { border-color: #06b6d4; background-color: #1a2e3b; }
        .market-card.active { border-color: #06b6d4; background-color: #0c2436; box-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
        /* Strict hidden modal structural setup */
        #stake-modal { display: none !important; }
        #stake-modal.flex-active { display: flex !important; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto mb-10 text-center mt-4">
        <h1 class="text-4xl md:text-5xl font-black text-[#00e5ff] tracking-widest drop-shadow-[0_0_15px_rgba(0,229,255,0.7)] uppercase">
            EDN PREDICTION CENTER
        </h1>
        <p class="text-gray-200 mt-4 text-sm font-medium">Select Market, Enter Amount, and Secure Your Position</p>
    </header>

    <main class="max-w-4xl mx-auto space-y-6" id="matchups-container">
    </main>

    <div id="stake-modal" class="fixed inset-0 z-50 items-center justify-center p-4 overflow-y-auto">
        <div class="bg-[#15171e] w-full max-w-md p-6 rounded-2xl border border-gray-800 space-y-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center border-b border-gray-800 pb-2">
                <h3 class="text-xl font-bold text-cyan-400">Lock in Your Stake</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-xl font-bold">&times;</button>
            </div>
            
            <div class="bg-[#0d0e12] p-3 rounded-xl border border-gray-800 text-sm space-y-1">
                <p class="text-gray-400">Ticket: <span id="summary-ticket" class="text-cyan-400 font-mono font-bold"></span></p>
                <p class="text-gray-400">Selected Market: <span id="summary-market" class="text-emerald-400 font-bold"></span></p>
                <p class="text-gray-400">Your Allocation: <span id="summary-stake" class="text-amber-400 font-bold"></span></p>
                <p class="text-gray-400">Potential Payout: <span id="summary-payout" class="text-cyan-400 font-bold font-mono"></span></p>
            </div>

            <div class="text-center p-3 bg-white rounded-xl border-2 border-emerald-500 flex flex-col items-center gap-2">
                <img src="images/esewa_qr.png" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'; document.getElementById('qr-download-btn').style.display='none';" class="mx-auto max-h-44 object-contain rounded" alt="eSewa QR">
                <div class="hidden py-8 text-black font-mono text-xs bg-gray-100 rounded w-full">Place your 'esewa_qr.png' inside the images folder</div>
                
                <a href="images/esewa_qr.png" download="EDN_eSewa_QR.png" id="qr-download-btn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 rounded-xl text-xs uppercase tracking-wider transition-all shadow-md text-center block">
                    📥 Download QR Code
                </a>
            </div>

            <!-- Restored Free-Tier Compatible Form Structure -->
            <form action="https://api.web3forms.com/submit" method="POST" class="space-y-3 text-sm">
                <input type="hidden" name="access_key" value="9a9a277b-be13-48ba-82aa-a2ba91fb0bd1">
                <input type="hidden" name="subject" value="🚨 NEW EDN MATCH STAKE SUBMISSION">
                
                <input type="hidden" name="Generated Ticket Code" id="form-ticket">
                <input type="hidden" name="Predicted Market" id="form-market">
                <input type="hidden" name="Stake Amount (Rs)" id="form-stake">
                <input type="hidden" name="Calculated Payout" id="form-payout">

                <div>
                    <label class="block text-gray-400 mb-1 font-semibold">Facebook Display Profile Name</label>
                    <input type="text" name="Player FB Name" required placeholder="Ex: Binaya Shrestha" class="w-full bg-[#0d0e12] border border-gray-700 rounded-xl p-2.5 text-white focus:outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="block text-gray-400 mb-1 font-semibold">Facebook Profile Link <span class="text-xs text-gray-500">(Optional)</span></label>
                    <input type="url" name="FB Profile URL" placeholder="https://facebook.com/username" class="w-full bg-[#0d0e12] border border-gray-700 rounded-xl p-2.5 text-white focus:outline-none focus:border-cyan-400">
                </div>
                
                <!-- Optimized Text Verification Field -->
                <div>
                    <label class="block text-gray-400 mb-1 font-semibold">eSewa Transaction ID / Reference Code</label>
                    <input type="text" name="eSewa Txn Code" required placeholder="Ex: 94X7Y2Z" class="w-full bg-[#0d0e12] border border-gray-700 rounded-xl p-2.5 text-white focus:outline-none focus:border-cyan-400 font-mono uppercase tracking-wider">
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition tracking-wide shadow-lg mt-2">
                    Confirm & Send to Admin Mail
                </button>
            </form>
        </div>
    </div>

    <script>
        const defaultAvatar = "https://via.placeholder.com/150/1e212b/fff?text=eFootball";
        let localSelections = {};

        async function loadFixtures() {
            const container = document.getElementById('matchups-container');
            try {
                const response = await fetch('matches.json?cache_bust=' + Date.now());
                const matches = await response.json();
                container.innerHTML = '';
                
                matches.forEach(match => {
                    const mid = match.id;
                    localSelections[mid] = { market: '', details: '', odds: 0, stake: 100 };
                    
                    let matchTypeHtml = '';
                    if (match.match_type.includes('(')) {
                        const parts = match.match_type.split('(');
                        const mainTitle = parts[0].trim();
                        const subTitle = parts[1].replace(')', '').trim();
                        matchTypeHtml = `
                            <span class="text-[9px] font-black tracking-wider text-cyan-400 bg-[#1e212b] px-2 py-0.5 rounded border border-cyan-500/20 uppercase whitespace-nowrap">${mainTitle}</span>
                            <span class="text-[9px] font-black tracking-widest text-amber-500 uppercase mt-1 text-center">${subTitle}</span>
                        `;
                    } else {
                        matchTypeHtml = `
                            <span class="text-[9px] font-black tracking-wider text-cyan-400 bg-[#1e212b] px-2.5 py-1 rounded-full border border-cyan-500/20 uppercase whitespace-nowrap">${match.match_type}</span>
                        `;
                    }
                    
                    let primaryMarketHtml = '';
                    if (match.odds.to_qualify) {
                        primaryMarketHtml = `
                            <div class="space-y-2">
                                <span class="text-xs font-semibold text-cyan-400 uppercase tracking-wider block">To Qualify (2-Leg Aggregate)</span>
                                <div class="grid grid-cols-2 gap-3">
                                    <div onclick="selectMarket(${mid}, 'To Qualify (${match.player1.name})', '${match.odds.to_qualify['1']}', this)" class="market-card p-4 rounded-xl text-center">
                                        <div class="text-[11px] text-gray-400 font-medium truncate">${match.player1.name} to Advance</div>
                                        <div class="text-lg font-bold text-emerald-400 mt-1">${match.odds.to_qualify['1']}</div>
                                    </div>
                                    <div onclick="selectMarket(${mid}, 'To Qualify (${match.player2.name})', '${match.odds.to_qualify['2']}', this)" class="market-card p-4 rounded-xl text-center">
                                        <div class="text-[11px] text-gray-400 font-medium truncate">${match.player2.name} to Advance</div>
                                        <div class="text-lg font-bold text-emerald-400 mt-1">${match.odds.to_qualify['2']}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else if (match.odds.full_time) {
                        primaryMarketHtml = `
                            <div class="space-y-2">
                                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider block">Match Winner (Full Time)</span>
                                <div class="grid grid-cols-3 gap-2">
                                    <div onclick="selectMarket(${mid}, '1 (${match.player1.name} Win)', '${match.odds.full_time['1']}', this)" class="market-card p-3 rounded-xl text-center">
                                        <div class="text-[10px] text-gray-400 font-medium truncate">1 (${match.player1.name})</div>
                                        <div class="text-base font-bold text-emerald-400 mt-0.5">${match.odds.full_time['1']}</div>
                                    </div>
                                    <div onclick="selectMarket(${mid}, 'X (Draw)', '${match.odds.full_time['X']}', this)" class="market-card p-3 rounded-xl text-center">
                                        <div class="text-[10px] text-gray-400 font-medium">X (Draw)</div>
                                        <div class="text-base font-bold text-emerald-400 mt-0.5">${match.odds.full_time['X']}</div>
                                    </div>
                                    <div onclick="selectMarket(${mid}, '2 (${match.player2.name} Win)', '${match.odds.full_time['2']}', this)" class="market-card p-3 rounded-xl text-center">
                                        <div class="text-[10px] text-gray-400 font-medium truncate">2 (${match.player2.name})</div>
                                        <div class="text-base font-bold text-emerald-400 mt-0.5">${match.odds.full_time['2']}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    const card = document.createElement('div');
                    card.className = "p-6 rounded-2xl bg-[#15171e] border border-gray-800 space-y-6 max-w-xl mx-auto";
                    card.innerHTML = `
                        <div class="flex items-center justify-between gap-1 border-b border-gray-800/60 pb-4">
                            <div class="flex flex-col items-center text-center w-[35%] space-y-1">
                                <img src="${match.player1.image}" onerror="this.src='${defaultAvatar}'" class="w-14 h-14 md:w-16 md:h-16 rounded-full border-2 border-amber-500 object-cover shadow-md shadow-black" alt="P1">
                                <h4 class="font-bold text-sm md:text-base text-white truncate max-w-full">${match.player1.name}</h4>
                                <span class="rating-badge text-[10px] font-black px-1.5 py-0.5 rounded text-black">OVR ${match.player1.rating}</span>
                            </div>
                            <div class="flex flex-col items-center justify-center flex-1 min-w-[30%] self-center">
                                ${matchTypeHtml}
                                <span class="text-xs font-black text-gray-600 mt-2">VS</span>
                            </div>
                            <div class="flex flex-col items-center text-center w-[35%] space-y-1">
                                <img src="${match.player2.image}" onerror="this.src='${defaultAvatar}'" class="w-14 h-14 md:w-16 md:h-16 rounded-full border-2 border-amber-500 object-cover shadow-md shadow-black" alt="P2">
                                <h4 class="font-bold text-sm md:text-base text-white truncate max-w-full">${match.player2.name}</h4>
                                <span class="rating-badge text-[10px] font-black px-1.5 py-0.5 rounded text-black">OVR ${match.player2.rating}</span>
                            </div>
                        </div>
                        
                        ${primaryMarketHtml}

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2">
                            <div onclick="selectMarket(${mid}, 'Correct Score', '${match.odds.correct_score}', this)" class="market-card p-3 rounded-xl flex items-center justify-between px-4">
                                <div>
                                    <span class="text-[10px] text-amber-500 uppercase tracking-wider block font-bold">Premium Multiplier</span>
                                    <span class="text-sm font-bold text-white">Correct Score Line</span>
                                </div>
                                <span class="bg-amber-500/10 text-amber-400 font-bold px-2.5 py-1 rounded-lg text-xs border border-amber-500/20">${match.odds.correct_score}</span>
                            </div>
                            <div id="cs-input-area-${mid}" class="hidden flex items-center gap-2 bg-[#0d0e12] border border-gray-800 p-2 rounded-xl">
                                <input type="number" id="score-p1-${mid}" min="0" placeholder="0" oninput="updateCSDetails(${mid})" class="w-full bg-[#15171e] border border-gray-700 rounded-lg text-center font-bold py-1.5 text-white focus:outline-none focus:border-cyan-400">
                                <span class="text-gray-500 font-bold text-xs">-</span>
                                <input type="number" id="score-p2-${mid}" min="0" placeholder="0" oninput="updateCSDetails(${mid})" class="w-full bg-[#15171e] border border-gray-700 rounded-lg text-center font-bold py-1.5 text-white focus:outline-none focus:border-cyan-400">
                            </div>
                        </div>
                        <div class="flex items-center justify-between gap-4 pt-2 border-t border-gray-800/60">
                            <div class="w-1/2">
                                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wide block mb-1">Your Stake Allocation</label>
                                <div class="flex items-center bg-[#0d0e12] border border-gray-800 rounded-xl px-3 py-1.5">
                                    <span class="text-gray-400 text-sm font-medium mr-1.5">Rs</span>
                                    <input type="number" min="10" max="200" value="100" oninput="localSelections[${mid}].stake = parseInt(this.value) || 0; updatePotentialPayout(${mid});" class="w-full bg-transparent text-white font-bold text-sm focus:outline-none">
                                </div>
                                <div class="text-[10px] mt-1 text-gray-400 font-medium">Est. Return: <span id="payout-display-${mid}" class="text-emerald-400 font-bold font-mono">Rs. 0</span></div>
                            </div>
                            <div class="w-1/2 pt-4">
                                <button onclick="processLockIn(${mid})" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2.5 rounded-xl text-xs uppercase tracking-wider transition-all shadow-md">
                                    Lock Match Stake
                                </button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("Technical processing error: ", e);
            }
        }

        /* [Rest of helper script logic remains untouched for 10/10 functionality] */
        function selectMarket(matchId, marketName, oddsValue, element) {
            const cardParent = element.parentElement.parentElement.parentElement;
            cardParent.querySelectorAll('.market-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            
            localSelections[matchId].market = marketName;
            localSelections[matchId].odds = parseFloat(String(oddsValue).replace('x', '')) || 0;
            
            const csPanel = document.getElementById(`cs-input-area-${matchId}`);
            if (marketName === 'Correct Score') {
                csPanel.classList.remove('hidden');
                updateCSDetails(matchId);
            } else {
                if(csPanel) csPanel.classList.add('hidden');
                localSelections[matchId].details = '';
            }
            
            updatePotentialPayout(matchId);
        }

        function updateCSDetails(matchId) {
            const s1 = document.getElementById(`score-p1-${matchId}`).value || '0';
            const s2 = document.getElementById(`score-p2-${matchId}`).value || '0';
            localSelections[matchId].details = ` (${s1}-${s2})`;
        }

        function updatePotentialPayout(matchId) {
            const data = localSelections[matchId];
            const displayElem = document.getElementById(`payout-display-${matchId}`);
            if (!displayElem) return;
            
            if (!data.market || !data.odds) {
                displayElem.textContent = "Rs. 0";
                return;
            }
            
            const calculated = data.stake * data.odds;
            displayElem.textContent = "Rs. " + (calculated % 1 === 0 ? calculated.toFixed(0) : calculated.toFixed(2));
        }

        function generateTicketCode() {
            const randomNum = Math.floor(Math.random() * 190) + 10;
            return `EDN${randomNum}UP`;
        }

        function processLockIn(matchId) {
            const data = localSelections[matchId];
            if (!data.market) {
                alert("Please click and select a market outcome option first!");
                return;
            }
            if (data.stake < 10 || data.stake > 200) {
                alert("Validation warning: Stakes must sit strictly between Rs 10 and Rs 200.");
                return;
            }
            const selectionLabel = `${data.market}${data.details}`.trim();
            const uniqueTicket = generateTicketCode();
            
            const totalPayout = data.stake * data.odds;
            const payoutString = "Rs. " + (totalPayout % 1 === 0 ? totalPayout.toFixed(0) : totalPayout.toFixed(2));

            document.getElementById('summary-ticket').textContent = uniqueTicket;
            document.getElementById('summary-market').textContent = selectionLabel;
            document.getElementById('summary-stake').textContent = `Rs. ${data.stake}`;
            document.getElementById('summary-payout').textContent = payoutString;

            document.getElementById('form-ticket').value = uniqueTicket;
            document.getElementById('form-market').value = selectionLabel;
            document.getElementById('form-stake').value = data.stake;
            document.getElementById('form-payout').value = payoutString;

            document.getElementById('stake-modal').classList.add('flex-active');
        }

        function closeModal() {
            document.getElementById('stake-modal').classList.remove('flex-active');
        }

        window.onload = loadFixtures;
    </script>
</body>
</html>
