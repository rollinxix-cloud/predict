<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDN Prediction Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); 
            color: #e2e8f0; 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh;
        }
        .rating-badge { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .market-card { background-color: rgba(21, 23, 30, 0.7); border: 1px solid rgba(6, 182, 212, 0.2); cursor: pointer; transition: all 0.2s ease-in-out; backdrop-filter: blur(4px); }
        .market-card:hover { border-color: #06b6d4; background-color: rgba(26, 46, 59, 0.8); }
        .market-card.active { border-color: #8b5cf6; background-color: rgba(79, 70, 229, 0.3); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }
        #stake-modal { display: none !important; }
        #stake-modal.flex-active { display: flex !important; background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto mb-8 text-center">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 tracking-wider uppercase">EDN Prediction Center</h1>
        <p class="text-cyan-200 mt-2 text-sm opacity-80 uppercase tracking-widest font-semibold">eFootball Match Strategy & Stake Portal</p>
    </header>

    <main class="max-w-4xl mx-auto space-y-6" id="matchups-container">
        </main>

    <div id="stake-modal" class="fixed inset-0 z-50 items-center justify-center p-4 overflow-y-auto">
        <div class="bg-[#111827]/90 border border-purple-500/30 w-full max-w-md p-6 rounded-3xl space-y-4 shadow-2xl backdrop-blur-xl">
            <div class="flex justify-between items-center border-b border-purple-500/20 pb-2">
                <h3 class="text-xl font-bold text-purple-400">Transaction Slip</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-sm space-y-2">
                <p class="text-gray-400">Ticket: <span id="summary-ticket" class="text-cyan-400 font-mono font-bold"></span></p>
                <p class="text-gray-400">Market: <span id="summary-market" class="text-emerald-400 font-bold"></span></p>
                <p class="text-gray-400">Stake: <span id="summary-stake" class="text-amber-400 font-bold"></span></p>
            </div>

            <div class="text-center p-2 bg-white rounded-2xl border-4 border-purple-600">
                <img src="images/esewa_qr.png" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" class="mx-auto max-h-40 object-contain rounded-lg" alt="eSewa QR">
                <div class="hidden py-6 text-black font-mono text-xs">Place 'esewa_qr.png' in images folder</div>
                <p class="text-[10px] text-gray-600 font-bold mt-2 italic">Allowed Stake: Rs 10 - Rs 200</p>
            </div>

            <form action="https://api.web3forms.com/submit" method="POST" class="space-y-3 text-sm">
                <input type="hidden" name="access_key" value="9a9a277b-be13-48ba-82aa-a2ba91fb0bd1">
                <input type="hidden" name="Generated Ticket Code" id="form-ticket">
                <input type="hidden" name="Predicted Market" id="form-market">
                <input type="hidden" name="Stake Amount (Rs)" id="form-stake">
                
                <input type="text" name="Player FB Name" required placeholder="Facebook Profile Name" class="w-full bg-black/50 border border-purple-500/30 rounded-xl p-3 text-white">
                <input type="text" name="eSewa Txn Code" required placeholder="eSewa Transaction Code" class="w-full bg-black/50 border border-purple-500/30 rounded-xl p-3 text-white font-mono">
                
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all">
                    Confirm & Send
                </button>
            </form>
        </div>
    </div>

    <script>
        // ... (Keep your existing JS logic exactly as is, it's working perfectly)
        const defaultAvatar = "https://via.placeholder.com/150/1e212b/fff?text=eFootball";
        let localSelections = {};

        async function loadFixtures() {
            const container = document.getElementById('matchups-container');
            const response = await fetch('matches.json?cache_bust=' + Date.now());
            const matches = await response.json();
            container.innerHTML = '';
            matches.forEach(match => {
                const mid = match.id;
                localSelections[mid] = { market: '', details: '', stake: 100 };
                const card = document.createElement('div');
                card.className = "p-6 rounded-3xl bg-[#1e293b]/60 border border-white/10 backdrop-blur-sm";
                card.innerHTML = `
                    <div class="flex items-center justify-between gap-2 border-b border-white/10 pb-4">
                        <div class="flex flex-col items-center w-[40%]"><img src="${match.player1.image}" onerror="this.src='${defaultAvatar}'" class="w-16 h-16 rounded-full border-2 border-purple-500 object-cover"><h4 class="font-bold text-sm text-white mt-2">${match.player1.name}</h4></div>
                        <div class="text-cyan-400 font-black text-xl italic">VS</div>
                        <div class="flex flex-col items-center w-[40%]"><img src="${match.player2.image}" onerror="this.src='${defaultAvatar}'" class="w-16 h-16 rounded-full border-2 border-purple-500 object-cover"><h4 class="font-bold text-sm text-white mt-2">${match.player2.name}</h4></div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 pt-4">
                        <div onclick="selectMarket(${mid}, '1 (${match.player1.name} Win)', this)" class="market-card p-3 rounded-xl text-center"><div class="text-[9px] uppercase font-bold text-gray-400">1 (Home)</div><div class="text-md font-black text-white">${match.odds.full_time['1']}</div></div>
                        <div onclick="selectMarket(${mid}, 'X (Draw)', this)" class="market-card p-3 rounded-xl text-center"><div class="text-[9px] uppercase font-bold text-gray-400">X (Draw)</div><div class="text-md font-black text-white">${match.odds.full_time['X']}</div></div>
                        <div onclick="selectMarket(${mid}, '2 (${match.player2.name} Win)', this)" class="market-card p-3 rounded-xl text-center"><div class="text-[9px] uppercase font-bold text-gray-400">2 (Away)</div><div class="text-md font-black text-white">${match.odds.full_time['2']}</div></div>
                    </div>
                    <div class="pt-4 flex items-center justify-between">
                        <input type="number" min="10" max="200" value="100" oninput="localSelections[${mid}].stake = this.value" class="w-[30%] bg-black/40 border border-white/10 rounded-xl p-2.5 text-center font-bold text-white">
                        <button onclick="processLockIn(${mid})" class="w-[65%] bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-widest shadow-lg">Lock Match Stake</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function generateTicketCode() { return `EDN${Math.floor(Math.random() * 899) + 100}UP`; }

        function processLockIn(matchId) {
            const data = localSelections[matchId];
            if (!data.market) { alert("Select a market first!"); return; }
            const uniqueTicket = generateTicketCode();
            document.getElementById('summary-ticket').textContent = uniqueTicket;
            document.getElementById('summary-market').textContent = data.market;
            document.getElementById('summary-stake').textContent = `Rs. ${data.stake}`;
            document.getElementById('form-ticket').value = uniqueTicket;
            document.getElementById('form-market').value = data.market;
            document.getElementById('form-stake').value = data.stake;
            document.getElementById('stake-modal').classList.add('flex-active');
        }

        function closeModal() { document.getElementById('stake-modal').classList.remove('flex-active'); }
        window.onload = loadFixtures;
    </script>
</body>
</html>
